name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 매일 KST 03:00 (UTC 18:00) 행사 데이터 자동 동기화
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

# 스케줄과 푸시가 겹쳐 실행돼도 마지막 하나만 반영되도록 직렬화
concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Refresh event data (crawl)
        # 크롤이 전부 실패(exit 1)해도 기존 deals.json으로 빌드·배포는 계속한다.
        # runAll.js 자체 안전장치: 0건 브랜드는 기존 데이터를 유지한다.
        continue-on-error: true
        run: node scripts/runAll.js

      - name: Build
        run: node scripts/build-toss.js

      - name: Copy dist to docs
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ "카페 행사/deals.json"
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 건너뜀"
          else
            git commit -m "deploy: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase origin main
            git push
          fi
