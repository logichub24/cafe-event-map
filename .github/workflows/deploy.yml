name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: node scripts/build-toss.js

      - name: Copy dist to docs
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

      - name: Commit & push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "deploy: $(date +'%Y-%m-%d %H:%M KST')"
          git push
